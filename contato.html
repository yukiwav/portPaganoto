<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Colégio Paganoto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
        <div class="logo-area">
            <img src="img/img.png" alt="Logo do Colégio Paganoto">
            <span>Colégio Paganoto</span>
        </div>
        <nav>
            <nav>
                <a href="index.html">Início</a>
                <a href="contato.html">Contato</a>
                <a href="professores.html">Professores</a>
                <a href="calendario.html">Calendário</a>
                <a href="galeria.html">Galeria</a>
            </nav>
        </nav>
    </header>

    <main class="pagina">
        <section class="main-texto">
            <h1>Entre em Contato</h1>
            
            <p>
                Entre em contato com a secretaria do colégio. Responderemos o mais breve possível.
            </p>

            <!-- Formulário de Contato -->
            <div class="formulario-contato">
                <h2>Envie sua mensagem</h2>
                <form action="#" method="POST">

                    <div class="form-group">
                        <label for="tipo">Quem está entrando em contato? *</label>
                        <select id="tipo" name="tipo" required onchange="mostrarTurma()">
                            <option value="">Selecione uma opção</option>
                            <option value="aluno">Aluno</option>
                            <option value="pai">Pai / Mãe / Responsável</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>

                    <!-- Campo de Turma (aparece só para Aluno ou Responsável) -->
                    <div class="form-group" id="grupo-turma" style="display: none;">
                        <label for="turma">Turma / Série *</label>
                        <input type="text" id="turma" name="turma" placeholder="Ex: 9º Ano A ou 3º EM B">
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome completo *</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone">
                    </div>

                    <div class="form-group">
                        <label for="assunto">Assunto *</label>
                        <select id="assunto" name="assunto" required>
                            <option value="">Selecione um assunto</option>
                            <option value="matricula">Matrícula</option>
                            <option value="informacoes">Informações Gerais</option>
                            <option value="reclamacao">Reclamação / Sugestão</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mensagem">Mensagem *</label>
                        <textarea id="mensagem" name="mensagem" rows="6" required></textarea>
                    </div>

                    <button type="submit" class="botao">Enviar Mensagem</button>
                </form>
            </div>
            <script>
                function mostrarTurma() {
                    const tipo = document.getElementById('tipo').value;
                    const grupoTurma = document.getElementById('grupo-turma');
                    
                    if (tipo === 'aluno' || tipo === 'pai') {
                        grupoTurma.style.display = 'block';
                    } else {
                        grupoTurma.style.display = 'none';
                    }
                }
            </script>
        </body>
        </html>
